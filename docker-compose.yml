services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://veterinary-system-db:3306/db_unab?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-veterinary}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-veterinary}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
    ports:
      - "${API_PORT:-9090}:9090"
    networks:
      veterinary-network:
        aliases:
          - veterinary-system-api

networks:
  veterinary-network:
    name: veterinary-system-network
    external: true
