server.port=9090
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://veterinary-system-db:3306/db_unab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:veterinary}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:veterinary}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL57Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
logging.level.org.hibernate.SQL=debug
